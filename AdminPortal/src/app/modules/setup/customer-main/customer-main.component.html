<div class="at-page animate-fade-up">
  <button class="at-back-btn" (click)="goBack()">← Back to Setup</button>

  <div class="at-page-header">
    <h1 class="at-page-title font-display">Customer Main</h1>
    <p class="at-page-subtitle">Onboard or view customers in your system</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl">
    <div class="at-option-card" (click)="navigate('initiate')">
      <div class="card-stripe bg-primary-500"></div>
      <div class="card-icon-wrap bg-primary-50">➕</div>
      <p class="card-title">Initiate</p>
      <p class="card-desc">Onboard a new customer with full profile, company details, address, and plan selection</p>
      <span class="card-arrow">→</span>
    </div>
    <div class="at-option-card" (click)="navigate('view')">
      <div class="card-stripe bg-teal-500"></div>
      <div class="card-icon-wrap bg-teal-50">👀</div>
      <p class="card-title">View</p>
      <p class="card-desc">Browse and manage all existing onboarded customers with search and filter</p>
      <span class="card-arrow">→</span>
    </div>
  </div>
</div>
