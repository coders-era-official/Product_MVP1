<div class="page-shell">
  <button type="button" class="btn btn-outline" (click)="goBack()">← Back to Customer Service</button>
  <header class="page-shell__header">
    <div class="badge">Service # will be: {{ nextNumber }}</div>
    <h1>Add Service</h1>
    <p>Create a customer-facing service linked to a service category.</p>
  </header>

  <div class="toast" *ngIf="successMessage">{{ successMessage }}</div>

  <form class="form-card at-card" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      <span>Service Name *</span>
      <input formControlName="serviceName" type="text" placeholder="Front Desk Management" />
    </label>

    <label class="field">
      <span>Category *</span>
      <select formControlName="categoryId">
        <option value="">Select a category</option>
        <option *ngFor="let category of categories" [value]="category.id">
          #{{ category.categoryNumber }} {{ category.categoryName }}
        </option>
      </select>
    </label>

    <label class="field">
      <span>Description</span>
      <textarea formControlName="description" rows="4" placeholder="Describe this service"></textarea>
    </label>

    <div class="field">
      <span>Status</span>
      <div class="toggle-group">
        <button type="button" [class.active]="form.value.status === 'Active'" (click)="form.patchValue({ status: 'Active' })">Active</button>
        <button type="button" [class.active]="form.value.status === 'Inactive'" (click)="form.patchValue({ status: 'Inactive' })">Inactive</button>
      </div>
    </div>

    <span class="error" *ngIf="form.invalid && form.touched">Service name and category are required.</span>

    <div class="actions">
      <button type="submit" class="btn btn-primary">Save Service</button>
    </div>
  </form>
</div>
