<div class="at-page animate-fade-up">
  <button class="at-back-btn" (click)="goBack()">← Back</button>
  <div class="at-page-header">
    <h1 class="at-page-title font-display">Create Service</h1>
  </div>
  <div class="at-card-flat max-w-xl">
    <form [formGroup]="serviceForm">
      <div class="space-y-4">
        <div class="at-field">
          <label class="at-label">Service Number *</label>
          <input class="at-input" type="number" formControlName="serviceNumber" readonly>
          <span class="at-hint">Next available service number is auto-generated.</span>
        </div>
        <div class="at-field">
          <label class="at-label">Service Name *</label>
          <input class="at-input" formControlName="serviceName" placeholder="e.g. Booking Engine">
          <span class="at-error" *ngIf="isFieldInvalid(serviceForm, 'serviceName')">Service name is required</span>
        </div>
        <div class="at-field">
          <label class="at-label">Category *</label>
          <select class="at-select" formControlName="categoryId">
            <option [ngValue]="null">Select a category</option>
            <option *ngFor="let category of categories" [ngValue]="category.id">{{ category.categoryName }}</option>
          </select>
          <span class="at-error" *ngIf="isFieldInvalid(serviceForm, 'categoryId')">Category is required</span>
        </div>
        <div class="at-field">
          <label class="at-label">Description</label>
          <textarea class="at-textarea" rows="4" formControlName="description" placeholder="What does this service enable?"></textarea>
        </div>
        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
          <div>
            <p class="text-sm font-medium text-gray-700">Status</p>
            <p class="text-xs text-gray-400">Service will be available immediately</p>
          </div>
          <div class="at-toggle-track" [class.on]="serviceForm.get('status')?.value === 'Active'" (click)="toggleStatus()">
            <div class="at-toggle-thumb"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-3 justify-end mt-6">
        <button type="button" class="at-btn-ghost" (click)="goBack()">Cancel</button>
        <button type="button" class="at-btn-primary" (click)="submitForm()">Create Service</button>
      </div>
      <p class="text-sm text-emerald-600 mt-4" *ngIf="successMessage">{{ successMessage }}</p>
    </form>
  </div>
</div>
