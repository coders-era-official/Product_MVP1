<div class="at-page animate-fade-up">
  <div class="flex items-center justify-between mb-6">
    <div>
      <button class="at-back-btn" (click)="goBack()">← Back</button>
      <h1 class="at-page-title font-display">Customer Services</h1>
    </div>
    <button class="at-btn-primary" routerLink="/setup/customer-service/form">+ Add Service</button>
  </div>

  <div class="flex flex-col sm:flex-row gap-3 mb-4">
    <div class="at-search flex-1 max-w-sm">
      <span class="at-search-icon">🔍</span>
      <input type="text" placeholder="Search services..." (input)="onFilterChange($any($event.target).value)">
    </div>
    <select class="at-select max-w-xs" [ngModel]="categoryFilter" (ngModelChange)="onFilterChange(undefined, $event)">
      <option value="All">All Categories</option>
      <option *ngFor="let category of categories" [ngValue]="category.id">{{ category.categoryName }}</option>
    </select>
  </div>

  <div class="at-card-flat p-0 overflow-hidden">
    <table class="at-table">
      <thead>
        <tr>
          <th>Service #</th>
          <th>Service Name</th>
          <th>Category</th>
          <th>Description</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let service of filteredServices">
          <td><span class="at-badge-number">#{{ service.serviceNumber }}</span></td>
          <td class="font-medium text-gray-900">{{ service.serviceName }}</td>
          <td><span class="at-badge at-badge-blue">{{ service.categoryName }}</span></td>
          <td class="text-gray-500">{{ service.description || '—' }}</td>
          <td>
            <span class="at-badge" [class.at-badge-active]="service.status === 'Active'" [class.at-badge-inactive]="service.status !== 'Active'">
              {{ service.status }}
            </span>
          </td>
          <td>
            <button
              class="text-xs px-3 py-1.5 rounded-lg border transition-all duration-150"
              [class.bg-red-50]="service.status === 'Active'"
              [class.text-red-600]="service.status === 'Active'"
              [class.border-red-100]="service.status === 'Active'"
              [class.bg-green-50]="service.status === 'Inactive'"
              [class.text-green-600]="service.status === 'Inactive'"
              [class.border-green-100]="service.status === 'Inactive'"
              (click)="toggleStatus(service)">
              {{ service.status === 'Active' ? 'Deactivate' : 'Activate' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
