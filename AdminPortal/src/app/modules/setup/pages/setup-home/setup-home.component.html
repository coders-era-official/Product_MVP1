<div class="at-page animate-fade-up">
  <div class="at-page-header">
    <h1 class="at-page-title font-display">Setup</h1>
    <p class="at-page-subtitle">Configure your AmazingTechnical environment</p>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
    <div class="at-stat-card">
      <p class="at-stat-label">Customers</p>
      <p class="at-stat-value">24</p>
      <span class="at-badge at-badge-active mt-1">+3 this week</span>
    </div>
    <div class="at-stat-card">
      <p class="at-stat-label">Active Roles</p>
      <p class="at-stat-value">6</p>
      <span class="at-badge at-badge-purple mt-1">2 new</span>
    </div>
    <div class="at-stat-card">
      <p class="at-stat-label">Categories</p>
      <p class="at-stat-value">4</p>
      <span class="at-badge at-badge-blue mt-1">#1 to #4</span>
    </div>
    <div class="at-stat-card">
      <p class="at-stat-label">Services</p>
      <p class="at-stat-value">18</p>
      <span class="at-badge at-badge-pending mt-1">5 pending</span>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (c of cards; track c.title) {
      <div class="at-option-card" [routerLink]="c.link">
        <div class="card-stripe"
          [class.bg-violet-500]="c.title === 'Customer Main'"
          [class.bg-sky-500]="c.title === 'Role'"
          [class.bg-emerald-500]="c.title === 'Service Category'"
          [class.bg-amber-500]="c.title === 'Customer Service'"
          [class.bg-rose-500]="c.title === 'Customer Role'"></div>
        <div class="card-icon-wrap"
          [class.bg-violet-50]="c.title === 'Customer Main'"
          [class.bg-sky-50]="c.title === 'Role'"
          [class.bg-emerald-50]="c.title === 'Service Category'"
          [class.bg-amber-50]="c.title === 'Customer Service'"
          [class.bg-rose-50]="c.title === 'Customer Role'">
          {{ c.icon }}
        </div>
        <p class="card-title">{{ c.title }}</p>
        <p class="card-desc">{{ c.body }}</p>
        <span class="card-arrow">→</span>
      </div>
    }
  </div>
</div>
