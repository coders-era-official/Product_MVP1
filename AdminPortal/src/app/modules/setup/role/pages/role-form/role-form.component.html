<div class="at-page animate-fade-up">
  <button class="at-back-btn" (click)="goBack()">← Back</button>
  <div class="at-page-header">
    <h1 class="at-page-title font-display">Create Role</h1>
  </div>
  <div class="at-card-flat max-w-xl">
    <form [formGroup]="roleForm">
      <div class="space-y-4">
        <div class="at-field">
          <label class="at-label">Role Name *</label>
          <input class="at-input" formControlName="roleName" placeholder="e.g. Hotel Admin">
          <span class="at-error" *ngIf="isFieldInvalid(roleForm, 'roleName')">Role name is required</span>
        </div>
        <div class="at-field">
          <label class="at-label">Role Code *</label>
          <input class="at-input" formControlName="roleCode" placeholder="e.g. HOTEL_ADMIN" style="text-transform:uppercase" (input)="uppercaseCode()">
          <span class="at-hint">Auto-uppercased. Use underscores for spaces.</span>
        </div>
        <div class="at-field">
          <label class="at-label">Description</label>
          <textarea class="at-textarea" rows="3" formControlName="description" placeholder="What can this role do?"></textarea>
        </div>

        <div class="at-field">
          <label class="at-label">Permissions *</label>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-1">
            <label
              *ngFor="let p of permissionOptions"
              class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer transition-all duration-150"
              [class.border-primary-300]="isPermissionSelected(p)"
              [class.bg-primary-50]="isPermissionSelected(p)"
              [class.border-gray-100]="!isPermissionSelected(p)">
              <input type="checkbox" [checked]="isPermissionSelected(p)" [value]="p" (change)="togglePermission(p)" class="accent-primary-600">
              <span class="text-sm text-gray-700">{{ p }}</span>
            </label>
          </div>
        </div>

        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
          <div>
            <p class="text-sm font-medium text-gray-700">Status</p>
            <p class="text-xs text-gray-400">Role will be active immediately</p>
          </div>
          <div class="at-toggle-track" [class.on]="roleForm.get('status')?.value === 'Active'" (click)="toggleStatus()">
            <div class="at-toggle-thumb"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-3 justify-end mt-6">
        <button type="button" class="at-btn-ghost" (click)="goBack()">Cancel</button>
        <button type="button" class="at-btn-primary" (click)="submitForm()">Create Role</button>
      </div>
      <p class="text-sm text-emerald-600 mt-4" *ngIf="successMessage">{{ successMessage }}</p>
    </form>
  </div>
</div>
