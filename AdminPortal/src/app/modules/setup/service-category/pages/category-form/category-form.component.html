<div class="at-page animate-fade-up">
  <button class="at-back-btn" (click)="goBack()">← Back</button>
  <div class="at-page-header">
    <h1 class="at-page-title font-display">Create Category</h1>
  </div>
  <div class="at-card-flat max-w-xl">
    <form [formGroup]="categoryForm">
      <div class="space-y-4">
        <div class="at-field">
          <label class="at-label">Category Number *</label>
          <input class="at-input" type="number" formControlName="categoryNumber" readonly>
          <span class="at-hint">Next available category number is auto-generated.</span>
        </div>
        <div class="at-field">
          <label class="at-label">Category Name *</label>
          <input class="at-input" formControlName="categoryName" placeholder="e.g. Hotel">
          <span class="at-error" *ngIf="isFieldInvalid(categoryForm, 'categoryName')">Category name is required</span>
        </div>
        <div class="at-field">
          <label class="at-label">Description *</label>
          <textarea class="at-textarea" rows="4" formControlName="description" placeholder="Describe what this category groups together"></textarea>
          <span class="at-error" *ngIf="isFieldInvalid(categoryForm, 'description')">Description is required</span>
        </div>
        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
          <div>
            <p class="text-sm font-medium text-gray-700">Status</p>
            <p class="text-xs text-gray-400">New categories are active by default</p>
          </div>
          <div class="at-toggle-track" [class.on]="categoryForm.get('status')?.value === 'Active'" (click)="toggleStatus()">
            <div class="at-toggle-thumb"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-3 justify-end mt-6">
        <button type="button" class="at-btn-ghost" (click)="goBack()">Cancel</button>
        <button type="button" class="at-btn-primary" (click)="submitForm()">Create Category</button>
      </div>
      <p class="text-sm text-emerald-600 mt-4" *ngIf="successMessage">{{ successMessage }}</p>
    </form>
  </div>
</div>
